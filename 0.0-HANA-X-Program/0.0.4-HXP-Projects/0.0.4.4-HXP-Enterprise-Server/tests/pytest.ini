[tool:pytest]
# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test directory
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --strict-config
    --tb=short
    --durations=10
    --color=yes
    --maxfail=3

# Markers for HANA-X-Enterprise-Server
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (moderate speed, some dependencies)
    system: System tests (slow, end-to-end)
    enterprise: Enterprise server specific tests
    performance: Performance critical tests
    production: Production environment tests
    security: Security-related tests
    mixtral: Tests specific to Mixtral models
    dialogs: Tests specific to DialoGPT models

# Minimum version requirements
minversion = 6.0

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:torch.*

# Test timeout (for CI/CD)
timeout = 300

# Enterprise-specific test configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
