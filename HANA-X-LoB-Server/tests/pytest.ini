[tool:pytest]
# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test directory
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --strict-config
    --tb=short
    --durations=10
    --color=yes
    --maxfail=5

# Markers for HANA-X-LoB-Server
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (moderate speed, some dependencies)
    system: System tests (slow, end-to-end)
    lob: Line of Business server specific tests
    coding: Coding and development related tests
    development: Development workflow tests
    specialized: Specialized model tests
    deepseek: Tests specific to DeepSeek models
    codellama: Tests specific to CodeLlama models
    debugging: Debugging assistance tests
    documentation: Documentation generation tests

# Minimum version requirements
minversion = 6.0

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:torch.*
    ignore::UserWarning:transformers.*

# Test timeout (for development workloads)
timeout = 600

# LoB-specific test configuration
log_cli = true
log_cli_level = DEBUG
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Development-focused collection
collect_ignore = [
    "examples/",
    "deprecated/",
    "experimental/"
]
